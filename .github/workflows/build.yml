name: Build DynamicLayout Core

on:
  push:
    branches: [main, master, develop]
  workflow_dispatch:

env:
  GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.parallel=false

jobs:
  build-jvm:
    name: JVM (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
    defaults:
      run:
        working-directory: core

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build JVM jar
        run: ./gradlew jvmJar

      - name: Upload JVM artifact
        uses: actions/upload-artifact@v4
        with:
          name: dynamiclayout-jvm
          path: core/build/libs/core-jvm-*.jar

  build-native:
    name: Native (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - linux_x64
    defaults:
      run:
        working-directory: core

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Compile native library (${{ matrix.target }})
        run: |
          case "${{ matrix.target }}" in
            linux_x64)   TASK="linkDebugKotlinNativeLinuxX64" ;;
            linux_arm64) TASK="linkDebugKotlinNativeLinuxArm64" ;;
          esac
          ./gradlew $TASK

      - name: Upload native artifact
        uses: actions/upload-artifact@v4
        with:
          name: dynamiclayout-${{ matrix.target }}
          path: core/build/bin/*/debug/*.klib

  build-js:
    name: JavaScript
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: core

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Compile JS
        run: ./gradlew jsMainClasses

      - name: Upload JS artifact
        uses: actions/upload-artifact@v4
        with:
          name: dynamiclayout-js
          path: core/build/classes/kotlin/js/main/

  test-jvm:
    name: Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: core

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Run JVM tests
        run: |
          chmod +x gradlew
          ./gradlew jvmJar
          java -Dorg.dynamiclayout.test=1 -jar build/libs/core-jvm-*.jar 2>&1 || true

  react:
    name: React
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: react

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build package
        run: npm run build

      - name: Upload React artifact
        uses: actions/upload-artifact@v4
        with:
          name: dynamiclayout-react
          path: react/dist/
